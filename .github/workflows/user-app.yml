name: Build User App

on:
  workflow_dispatch:

jobs:
  build:
    name: Build & Upload Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Recreate google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.USER_GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "Error: USER_GOOGLE_SERVICES_JSON secret is not set!"
            exit 1
          fi
          echo "$GOOGLE_SERVICES_JSON" > user-app/google-services.json

          # Validation
          if [ -f "user-app/google-services.json" ]; then
            echo "✅ google-services.json created successfully in user-app/"
            # Check if it contains the expected package name
            if grep -q "com.boxx.porn" user-app/google-services.json; then
              echo "✅ Package name match verified in google-services.json"
            else
              echo "⚠️ Warning: Package name 'com.boxx.porn' not found in google-services.json"
            fi
          else
            echo "❌ Failed to create google-services.json"
            exit 1
          fi

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew :user-app:assembleRelease --stacktrace

      - name: Locate APK
        id: apk-path
        run: |
          APK_PATH=$(find user-app/build/outputs/apk/release -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "Error: APK not found!"
            exit 1
          fi
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV
          echo "path=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: user-app-release
          path: ${{ env.APK_PATH }}
          retention-days: 7

      - name: Send APK to Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        if: success() && env.BOT_TOKEN != '' && env.CHAT_ID != ''
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          BRANCH_NAME=$(echo ${GITHUB_REF#refs/heads/})
          BUILD_TIME=$(date '+%Y-%m-%d %H:%M:%S')

          CAPTION="🚀 *User App Build Successful*

          *App:* Data Sync
          *Workflow:* ${{ github.workflow }}
          *Repo:* ${{ github.repository }}
          *Branch:* \`${BRANCH_NAME}\`
          *Commit:* \`${GITHUB_SHA:0:7}\`
          *Build Time:* ${BUILD_TIME}

          📝 *Message:*
          ${COMMIT_MSG}"

          curl -v -F chat_id="${CHAT_ID}" \
               -F document=@"${{ env.APK_PATH }}" \
               -F caption="${CAPTION}" \
               -F parse_mode="Markdown" \
               "https://api.telegram.org/bot${BOT_TOKEN}/sendDocument"

      - name: Notify Failure
        if: failure()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$BOT_TOKEN" ] && [ -n "$CHAT_ID" ]; then
            curl -v -X POST \
                 -H "Content-Type: application/json" \
                 -d "{\"chat_id\": \"${CHAT_ID}\", \"text\": \"❌ *User App Build Failed*\n\nWorkflow: ${{ github.workflow }}\nRepo: ${{ github.repository }}\nBranch: ${GITHUB_REF#refs/heads/}\", \"parse_mode\": \"Markdown\"}" \
                 "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage"
          fi
