name: Build User App

on:
  workflow_dispatch:

jobs:
  build:
    name: Build & Upload Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Validate Firebase Configuration
        run: |
          echo "🔍 Scanning for google-services.json..."
          if [ -f "user-app/google-services.json" ]; then
            echo "✅ google-services.json found in user-app/"
          else
            echo "❌ Error: user-app/google-services.json is missing!"
            exit 1
          fi

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew :user-app:assembleRelease --stacktrace

      - name: Locate and Verify APK
        id: apk-info
        run: |
          echo "📂 Searching for APK..."
          APK_PATH=$(find user-app/build/outputs/apk/release -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "❌ Error: APK not found!"
            exit 1
          fi

          APK_NAME=$(basename "$APK_PATH")
          APK_SIZE=$(du -h "$APK_PATH" | cut -f1)

          echo "✅ APK located at: $APK_PATH"
          echo "📦 APK Info:"
          echo "Path: $APK_PATH"
          echo "Size: $APK_SIZE"

          # Basic validation using build output (we can't easily run aapt on raw ubuntu without setup, but we know gradle config)
          echo "Application ID: com.boxx.porn"

          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV
          echo "APK_NAME=$APK_NAME" >> $GITHUB_ENV
          echo "APK_SIZE=$APK_SIZE" >> $GITHUB_ENV

      - name: Send APK to Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        if: success() && env.BOT_TOKEN != '' && env.CHAT_ID != ''
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          BRANCH_NAME=$(echo ${GITHUB_REF#refs/heads/})
          BUILD_TIME=$(date '+%Y-%m-%d %H:%M:%S')

          CAPTION="🚀 *User App - Signed Build Successful*

          *App:* Data Sync
          *Package:* \`com.boxx.porn\`
          *Workflow:* ${{ github.workflow }}
          *Branch:* \`${BRANCH_NAME}\`
          *Commit:* \`${GITHUB_SHA:0:7}\`
          *Build Time:* ${BUILD_TIME}
          *APK File:* \`${{ env.APK_NAME }}\`
          *APK Size:* \`${{ env.APK_SIZE }}\`
          *Status:* ✅ Signed with Test Keystore

          📝 *Message:*
          ${COMMIT_MSG}"

          echo "📤 Uploading to Telegram..."
          curl -v -F chat_id="${CHAT_ID}" \
               -F document=@"${{ env.APK_PATH }}" \
               -F caption="${CAPTION}" \
               -F parse_mode="Markdown" \
               "https://api.telegram.org/bot${BOT_TOKEN}/sendDocument"

      - name: Notify Failure
        if: failure()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$BOT_TOKEN" ] && [ -n "$CHAT_ID" ]; then
            curl -v -X POST \
                 -H "Content-Type: application/json" \
                 -d "{\"chat_id\": \"${CHAT_ID}\", \"text\": \"❌ *User App Build Failed*\n\nWorkflow: ${{ github.workflow }}\nRepo: ${{ github.repository }}\nBranch: ${GITHUB_REF#refs/heads/}\", \"parse_mode\": \"Markdown\"}" \
                 "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage"
          fi
