name: Build Admin App

on:
  workflow_dispatch:

jobs:
  build:
    name: Build & Upload Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Validate Firebase Configuration
        run: |
          echo "🔍 Scanning for google-services.json..."
          if [ -f "admin-app/google-services.json" ]; then
            echo "✅ google-services.json found in admin-app/"
            ls -l admin-app/google-services.json
          elif [ -f "user-app/google-services.json" ]; then
            echo "⚠️ Warning: google-services.json not found in admin-app/, but found in user-app/."
            echo "Attempting to copy for Admin App build..."
            cp user-app/google-services.json admin-app/google-services.json
            echo "✅ Copied to admin-app/"
          else
            echo "⚠️ Warning: google-services.json missing for Admin App. Build might fail if Firebase is enabled."
          fi

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew :admin-app:clean :admin-app:assembleRelease --stacktrace

      - name: Locate APK
        id: apk-path
        run: |
          echo "📂 Searching for APK..."
          APK_PATH=$(find admin-app/build/outputs/apk/release -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "❌ Error: APK not found!"
            exit 1
          fi
          echo "✅ APK located at: $APK_PATH"
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV
          echo "path=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-app-release
          path: ${{ env.APK_PATH }}
          retention-days: 7

      - name: Send APK to Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        if: success() && env.BOT_TOKEN != '' && env.CHAT_ID != ''
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          BRANCH_NAME=$(echo ${GITHUB_REF#refs/heads/})
          BUILD_TIME=$(date '+%Y-%m-%d %H:%M:%S')

          CAPTION="🚀 *Admin App Build Successful*

          *App:* Data Sync Admin
          *Module:* admin-app
          *Package:* com.datasync.admin
          *Workflow:* ${{ github.workflow }}
          *Repo:* ${{ github.repository }}
          *Branch:* \`${BRANCH_NAME}\`
          *Commit:* \`${GITHUB_SHA:0:7}\`
          *Build Time:* ${BUILD_TIME}

          📝 *Message:*
          ${COMMIT_MSG}"

          echo "📤 Uploading to Telegram..."
          curl -v -F chat_id="${CHAT_ID}" \
               -F document=@"${{ env.APK_PATH }}" \
               -F caption="${CAPTION}" \
               -F parse_mode="Markdown" \
               "https://api.telegram.org/bot${BOT_TOKEN}/sendDocument"

      - name: Notify Failure
        if: failure()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$BOT_TOKEN" ] && [ -n "$CHAT_ID" ]; then
            curl -v -X POST \
                 -H "Content-Type: application/json" \
                 -d "{\"chat_id\": \"${CHAT_ID}\", \"text\": \"❌ *Admin App Build Failed*\n\nWorkflow: ${{ github.workflow }}\nRepo: ${{ github.repository }}\nBranch: ${GITHUB_REF#refs/heads/}\", \"parse_mode\": \"Markdown\"}" \
                 "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage"
          fi
